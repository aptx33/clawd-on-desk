<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src https://fonts.googleapis.com https://fonts.gstatic.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ease-spring: cubic-bezier(0.2, 0.9, 0.22, 1);
  --card-bg: rgba(255, 255, 255, 0.96);
  --card-border: rgba(24, 24, 27, 0.06);
  --card-shadow: 0 12px 40px rgba(24, 24, 27, 0.12), 0 2px 8px rgba(24, 24, 27, 0.06);
  --card-radius: 16px;
  --text-primary: #1a1a2e;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --section-bg: rgba(0, 0, 0, 0.02);
  --section-border: rgba(0, 0, 0, 0.04);
  --bar-bg: #f0f1f4;
  --bar-height: 10px;
  --bar-radius: 99px;
  --green-from: #a6e3a1; --green-to: #10b981;
  --yellow-from: #fab387; --yellow-to: #f59e0b;
  --red-from: #f38ba8; --red-to: #ef4444;
  --dot-cursor: #f5c2e7;
  --dot-codex: #89dceb;
  --dot-antigravity: #cba6f7;
  --dot-gemini: #f9e2af;
  --check-accent: #6366f1;
  --refresh-color: #9ca3af;
  --footer-bg: rgba(0, 0, 0, 0.02);
  --toggle-bg: rgba(0,0,0,0.04);
  --toggle-active-bg: rgba(99, 102, 241, 0.1);
  --toggle-active-border: rgba(99, 102, 241, 0.3);
}

@media (prefers-color-scheme: dark) {
  :root {
    --card-bg: rgba(24, 24, 30, 0.97);
    --card-border: rgba(255, 255, 255, 0.06);
    --card-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.2);
    --text-primary: #f0f0f5;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --section-bg: rgba(255, 255, 255, 0.03);
    --section-border: rgba(255, 255, 255, 0.05);
    --bar-bg: #2a2a35;
    --green-from: #34d399; --green-to: #059669;
    --yellow-from: #fbbf24; --yellow-to: #d97706;
    --red-from: #fb7185; --red-to: #dc2626;
    --refresh-color: #71717a;
    --footer-bg: rgba(255, 255, 255, 0.03);
    --toggle-bg: rgba(255,255,255,0.05);
    --toggle-active-bg: rgba(99, 102, 241, 0.15);
    --toggle-active-border: rgba(99, 102, 241, 0.4);
  }
}

html, body {
  background: transparent;
  overflow: hidden;
  max-height: 100vh;
  font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  cursor: default;
}

.panel {
  background: var(--card-bg);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border: 1px solid var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
  width: 340px;
  overflow: hidden;
}

/* ── Header / Toggles ── */
.header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 15px 40px 15px 14px;
  border-bottom: 1px solid var(--section-border);
  position: relative;
  flex-wrap: wrap;
}

.toggle-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1.5px solid transparent;
  background: var(--toggle-bg);
  color: var(--text-secondary);
}

.toggle-chip.active {
  background: var(--toggle-active-bg);
  border-color: var(--toggle-active-border);
  color: var(--text-primary);
}

.toggle-chip .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.toggle-chip:hover { opacity: 0.8; }

.header-right {
  position: absolute;
  top: 10px;
  right: 17px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 15px;
}

.refresh-btn {
  width: 18px; height: 28px;
  border: none; background: none;
  color: var(--refresh-color);
  cursor: pointer;
  border-radius: 8px;
  padding: 0;
  display: flex; align-items: center; justify-content: right;
  transition: all 0.2s ease;
  font-size: 16px;
  outline: none;
  -webkit-appearance: none;
}
.refresh-btn svg { display: block; }
.refresh-btn:hover { color: var(--text-primary); }
.refresh-btn:focus { outline: none; }
.refresh-btn:focus-visible { outline: none; }
.refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.header-time {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
  line-height: 1;
}

/* ── Sections ── */
.section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--section-border);
}
.section:last-of-type { border-bottom: none; }

.section-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}

.section-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.section-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: 0.01em;
}

.section-badge {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Progress bars ── */
.bar-row {
  margin-bottom: 6px;
}
.bar-row:last-child { margin-bottom: 0; }

.bar-label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 3px;
}

.bar-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
}

.bar-value {
  font-size: 11px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-primary);
}

.bar-track {
  width: 100%;
  height: var(--bar-height);
  background: var(--bar-bg);
  border-radius: var(--bar-radius);
  position: relative;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: var(--bar-radius);
  position: relative;
  transition: width 0.6s var(--ease-spring);
  min-width: 2px;
}

.bar-green  { background: var(--green-from); }
.bar-yellow { background: var(--yellow-from); }
.bar-red    { background: var(--red-from); }

/* ── Cursor section extras ── */
.cursor-stats {
  display: flex;
  gap: 8px;
  margin-top: 6px;
  flex-wrap: wrap;
}

.stat-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 10px;
  font-weight: 700;
  background: var(--section-bg);
  color: var(--text-secondary);
  border: 1px solid var(--section-border);
}

.stat-chip .stat-num {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-primary);
  font-weight: 700;
}

.section-account {
  font-size: 10px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  margin-left: auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cred-plan {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--toggle-bg);
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 4px;
}


/* ── Content scroll ── */
#content {
  max-height: 420px;
  overflow-y: auto;
  overflow-x: hidden;
}
#content::-webkit-scrollbar { width: 4px; }
#content::-webkit-scrollbar-track { background: transparent; }
#content::-webkit-scrollbar-thumb {
  background: var(--text-muted);
  border-radius: 4px;
  opacity: 0.5;
}
#content::-webkit-scrollbar-thumb:hover { opacity: 0.8; }

/* ── Empty state ── */
.empty-state {
  padding: 24px 14px;
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
}

/* ── Error / offline ── */
.status-msg {
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
  padding: 4px 0 2px;
}
</style>
</head>
<body>
<div class="panel" id="panel">

  <!-- Header toggles -->
  <div class="header">
    <div class="toggle-chip active" data-source="cursor" onclick="toggleSource('cursor')">
      <span class="dot" style="background:var(--dot-cursor)"></span>Cursor
    </div>
    <div class="toggle-chip active" data-source="codex" onclick="toggleSource('codex')">
      <span class="dot" style="background:var(--dot-codex)"></span>Codex
    </div>
    <div class="toggle-chip active" data-source="antigravity" onclick="toggleSource('antigravity')">
      <span class="dot" style="background:var(--dot-antigravity)"></span>Antigravity
    </div>
    <div class="toggle-chip active" data-source="gemini" onclick="toggleSource('gemini')">
      <span class="dot" style="background:var(--dot-gemini)"></span>Gemini
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()" title="刷新">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      </button>
      <span class="header-time" id="headerTime">--</span>
    </div>
  </div>

  <!-- Content rendered by JS -->
  <div id="content"></div>

</div>

<script>
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

let quotaData = null;
let config = {
  quotaShowCursor: true,
  quotaShowCodex: true,
  quotaShowAntigravity: true,
  quotaShowGemini: true,
};

function barColor(percent) {
  // percent = remaining percentage (100 = full quota left, 0 = depleted)
  if (percent > 60) return "bar-green";
  if (percent > 30) return "bar-yellow";
  return "bar-red";
}

function makeBar(label, percent, valueText) {
  const colorClass = barColor(percent);
  const fillW = Math.max(1, Math.min(100, percent));
  return `
    <div class="bar-row">
      <div class="bar-label-row">
        <span class="bar-label">${label}</span>
        <span class="bar-value">${valueText}</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill ${colorClass}" style="width:${fillW}%"></div>
      </div>
    </div>`;
}

function renderCursor(data) {
  if (!data) return '<div class="status-msg">Cursor 未登录</div>';
  const pctRemaining = data.total > 0 ? Math.round((data.remaining / data.total) * 100) : 0;
  const resetLabel = data.daysRemaining > 0 ? `${data.daysRemaining}天后重置` : '今天重置';
  const resetDateStr = data.resetDate ? formatResetDateShort(data.resetDate) : '';
  return `
    <div class="section-header">
      <span class="section-dot" style="background:var(--dot-cursor)"></span>
      <span class="section-title">Cursor Pro</span>
    </div>
    ${makeBar(resetLabel, pctRemaining, `${data.used} / ${data.total}` + (resetDateStr ? `  <span style="color:var(--text-muted);font-weight:500">${resetDateStr}</span>` : ''))}
    <div class="cursor-stats">
      <span class="stat-chip">剩余 <span class="stat-num">${data.remaining}</span> 次</span>
      <span class="stat-chip">日均 <span class="stat-num">${data.dailyAvg}</span> 次</span>
    </div>`;
}

function formatResetDateShort(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const mm = (d.getMonth() + 1).toString().padStart(2, '0');
  const dd = d.getDate().toString().padStart(2, '0');
  return `${mm}/${dd}`;
}

function formatResetTime(resetStr) {
  if (!resetStr) return '';
  const resetDate = new Date(resetStr);
  const diff = resetDate - Date.now();
  if (diff <= 0) return '';
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  let parts = [];
  if (d > 0) parts.push(`${d}天`);
  if (h > 0) parts.push(`${h}小时`);
  if (d === 0 && m > 0) parts.push(`${m}分钟`);
  return parts.join('');
}

// resetSec → 绝对重置时间戳（基于 quotaData.updatedAt 快照时间，而非当前时间）
function resetSecToEpoch(seconds) {
  if (!seconds || seconds <= 0) return 0;
  const base = (quotaData && quotaData.updatedAt) ? new Date(quotaData.updatedAt).getTime() : Date.now();
  return base + seconds * 1000;
}

// 从绝对重置时间反推当前剩余倒计时
function formatResetLabel(seconds) {
  const epoch = resetSecToEpoch(seconds);
  if (!epoch) return '';
  const diff = epoch - Date.now();
  if (diff <= 0) return '';
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  let parts = [];
  if (d > 0) parts.push(`${d}天`);
  if (h > 0) parts.push(`${h}小时`);
  if (m > 0) parts.push(`${m}分`);
  return parts.join('');
}

function formatResetDateTime(seconds) {
  const epoch = resetSecToEpoch(seconds);
  if (!epoch) return '';
  const resetDate = new Date(epoch);
  const mm = (resetDate.getMonth() + 1).toString().padStart(2, '0');
  const dd = resetDate.getDate().toString().padStart(2, '0');
  const hh = resetDate.getHours().toString().padStart(2, '0');
  const mi = resetDate.getMinutes().toString().padStart(2, '0');
  return `${mm}/${dd} ${hh}:${mi}`;
}

function renderCodex(cpaData) {
  if (!cpaData) return '<div class="status-msg">CPA 未运行</div>';
  const codexList = cpaData.codex || [];
  if (codexList.length === 0) return '<div class="status-msg">无 Codex 凭证</div>';

  let html = '';
  for (const cred of codexList) {
    const planLabel = cred.plan ? cred.plan.charAt(0).toUpperCase() + cred.plan.slice(1) : "";

    html += `<div class="section-header">
      <span class="section-dot" style="background:var(--dot-codex)"></span>
      <span class="section-title">Codex</span>
      <span class="section-account">${cred.name}${planLabel ? `<span class="cred-plan">${planLabel}</span>` : ''}</span>
    </div>`;

    // 5 小时限额
    if (cred.fiveHourUsedPct != null) {
      const remaining = Math.max(0, 100 - cred.fiveHourUsedPct);
      const resetCountdown = cred.fiveHourResetSec ? `（${formatResetLabel(cred.fiveHourResetSec)}）` : '';
      const resetTime = formatResetDateTime(cred.fiveHourResetSec);
      html += makeBar(`5 小时限额${resetCountdown}`, remaining, `${remaining}%` + (resetTime ? `  <span style="color:var(--text-muted);font-weight:500">${resetTime}</span>` : ''));
    }

    // 周限额
    if (cred.weeklyUsedPct != null) {
      const remaining = Math.max(0, 100 - cred.weeklyUsedPct);
      const resetCountdown = cred.weeklyResetSec ? `（${formatResetLabel(cred.weeklyResetSec)}）` : '';
      const resetTime = formatResetDateTime(cred.weeklyResetSec);
      html += makeBar(`周限额${resetCountdown}`, remaining, `${remaining}%` + (resetTime ? `  <span style="color:var(--text-muted);font-weight:500">${resetTime}</span>` : ''));
    }
  }
  return html;
}

function renderModelList(models) {
  let html = '';
  if (!models || models.length === 0) return html;
  for (const m of models) {
    const pct = Math.round((m.remainingFraction ?? 0) * 100);
    let resetStr = '';
    if (m.resetTime && m.resetTime !== '1970-01-01T00:00:00Z') {
      const rd = new Date(m.resetTime);
      const mm = (rd.getMonth() + 1).toString().padStart(2, '0');
      const dd = rd.getDate().toString().padStart(2, '0');
      const hh = rd.getHours().toString().padStart(2, '0');
      const mi = rd.getMinutes().toString().padStart(2, '0');
      resetStr = `  <span style="color:var(--text-muted);font-weight:500">${mm}/${dd} ${hh}:${mi}</span>`;
    }
    html += makeBar(m.modelId, pct, `${pct}%${resetStr}`);
  }
  return html;
}

function renderAntigravity(cpaData) {
  if (!cpaData) return '<div class="status-msg">CPA 未运行</div>';
  const agList = cpaData.antigravity || [];
  if (agList.length === 0) return '<div class="status-msg">无 Antigravity 凭证</div>';

  let html = '';
  for (const cred of agList) {
    html += `<div class="section-header">
      <span class="section-dot" style="background:var(--dot-antigravity)"></span>
      <span class="section-title">Antigravity</span>
      <span class="section-account">${cred.name}</span>
    </div>`;
    html += renderModelList((cred.groups && cred.groups.length > 0) ? cred.groups.map((group) => ({
      modelId: group.label,
      remainingFraction: group.remainingFraction,
      resetTime: group.resetTime,
    })) : cred.models);
  }
  return html;
}

function renderGemini(cpaData) {
  if (!cpaData) return '<div class="status-msg">CPA 未运行</div>';
  const geminiList = cpaData.gemini || [];
  if (geminiList.length === 0) return '<div class="status-msg">无 Gemini CLI 凭证</div>';

  let html = '';
  for (const cred of geminiList) {
    html += `<div class="section-header">
      <span class="section-dot" style="background:var(--dot-gemini)"></span>
      <span class="section-title">Gemini CLI</span>
      <span class="section-account">${cred.name}</span>
    </div>`;
    html += renderModelList(cred.models);
  }
  return html;
}

// ── Render ──

function render() {
  const el = $("#content");
  const sections = [];
  let anyVisible = false;

  if (config.quotaShowCursor) {
    anyVisible = true;
    sections.push(`<div class="section" data-section="cursor">${renderCursor(quotaData && quotaData.cursor)}</div>`);
  }
  if (config.quotaShowCodex) {
    anyVisible = true;
    sections.push(`<div class="section" data-section="codex">${renderCodex(quotaData && quotaData.cpa)}</div>`);
  }
  if (config.quotaShowAntigravity) {
    anyVisible = true;
    sections.push(`<div class="section" data-section="antigravity">${renderAntigravity(quotaData && quotaData.cpa)}</div>`);
  }
  if (config.quotaShowGemini) {
    anyVisible = true;
    sections.push(`<div class="section" data-section="gemini">${renderGemini(quotaData && quotaData.cpa)}</div>`);
  }

  if (!anyVisible) {
    el.innerHTML = '<div class="empty-state">点击顶部标签启用额度显示</div>';
  } else {
    el.innerHTML = sections.join("");
  }

  // 更新时间
  if (quotaData && quotaData.updatedAt) {
    const d = new Date(quotaData.updatedAt);
    $("#headerTime").textContent = `更新于${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}`;
  }

  reportHeight();
}

function reportHeight() {
  requestAnimationFrame(() => {
    const h = document.getElementById("panel").offsetHeight;
    if (window.quotaAPI) window.quotaAPI.reportHeight(h);
  });
}

// ── Toggle source ──

function toggleSource(source) {
  const key = "quotaShow" + source.charAt(0).toUpperCase() + source.slice(1);
  config[key] = !config[key];

  // 更新 chip UI
  const chip = document.querySelector(`.toggle-chip[data-source="${source}"]`);
  if (chip) chip.classList.toggle("active", config[key]);

  if (window.quotaAPI) window.quotaAPI.saveConfig(key, config[key]);
  render();
}

// ── Refresh ──

function doRefresh() {
  const btn = $("#refreshBtn");
  btn.classList.add("spinning");
  setTimeout(() => btn.classList.remove("spinning"), 1000);
  if (window.quotaAPI) window.quotaAPI.requestRefresh();
}

// ── Mouse tracking for hover mode ──

document.addEventListener("mouseenter", () => {
  if (window.quotaAPI) window.quotaAPI.mouseEnter();
});
document.addEventListener("mouseleave", () => {
  if (window.quotaAPI) window.quotaAPI.mouseLeave();
});

// ── IPC listeners ──

if (window.quotaAPI) {
  window.quotaAPI.onQuotaData((data) => {
    quotaData = data;
    render();
  });
  window.quotaAPI.onConfigUpdate((cfg) => {
    Object.assign(config, cfg);
    // 同步 chip 状态
    for (const src of ["cursor", "codex", "antigravity", "gemini"]) {
      const key = "quotaShow" + src.charAt(0).toUpperCase() + src.slice(1);
      const chip = document.querySelector(`.toggle-chip[data-source="${src}"]`);
      if (chip) chip.classList.toggle("active", !!config[key]);
    }
    render();
  });
}

// Initial render
render();
</script>
</body>
</html>
